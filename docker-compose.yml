services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ibis
      POSTGRES_USER: ibis_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ibis_user"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ibis.com
      PGADMIN_DEFAULT_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

  etl:
    build: .
    depends_on:
      db:
        condition: service_healthy
    secrets:
      - db_password
    volumes:
      - ./config.json:/app/config.json:ro
      - ./secrets:/app/secrets:ro
      - ./Downloads:/app/Downloads
      - ./Extracted:/app/Extracted
    command: ["cron", "-f"]

secrets:
  db_password:
    file: ./secrets/db_password.txt

volumes:
  pgdata:
